<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Solo Para Eva — Cosmética Artesanal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet" />

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { background-color: #F7F4EF; font-family: 'DM Sans', sans-serif; -webkit-font-smoothing: antialiased; }
    @keyframes marquee { from { transform: translateX(0); } to { transform: translateX(-50%); } }
    img { display: block; }
    button { font-family: inherit; }
    a { font-family: inherit; }
    textarea, input { font-family: inherit; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(28,43,18,0.2); border-radius: 10px; }
    /* Page transitions */
    .page-enter { animation: fadeSlideIn 0.45s cubic-bezier(0.16,1,0.3,1) both; }
    @keyframes fadeSlideIn { from { opacity: 0; transform: translateY(18px); } to { opacity: 1; transform: none; } }
    /* WhatsApp FAB */
    .wa-fab {
      position: fixed; bottom: 28px; right: 28px; z-index: 100;
      width: 56px; height: 56px; border-radius: 50%;
      background: #25D366; color: #fff; border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 8px 32px rgba(37,211,102,0.45);
      transition: all 0.3s cubic-bezier(0.16,1,0.3,1);
      text-decoration: none;
    }
    .wa-fab:hover { transform: translateY(-4px) scale(1.08); box-shadow: 0 16px 48px rgba(37,211,102,0.55); }
    .wa-fab svg { width: 28px; height: 28px; }
  </style>
</head>
<body>

<div id="root"></div>

<!-- Data -->
<script src="src/data.js"></script>

<!-- Components (loaded as Babel JSX) -->
<script type="text/babel" src="src/Header.jsx"></script>
<script type="text/babel" src="src/Footer.jsx"></script>
<script type="text/babel" src="src/HomePage.jsx"></script>
<script type="text/babel" src="src/ProductosPage.jsx"></script>
<script type="text/babel" src="src/NosotrosPage.jsx"></script>
<script type="text/babel" src="src/ContactoPage.jsx"></script>

<!-- App Shell -->
<script type="text/babel">
  const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
    "accentColor": "#aad585",
    "darkColor": "#1C2B12",
    "bgColor": "#F7F4EF",
    "roundedCards": true,
    "showPrices": false
  }/*EDITMODE-END*/;

  function App() {
    const [page, setPageRaw] = React.useState(() => {
      const stored = localStorage.getItem('spe_page');
      return stored || 'home';
    });
    const [tweaks, setTweaks] = React.useState(TWEAK_DEFAULTS);
    const [tweaksOpen, setTweaksOpen] = React.useState(false);
    const [animKey, setAnimKey] = React.useState(0);

    const setPage = (p) => {
      setPageRaw(p);
      localStorage.setItem('spe_page', p);
      setAnimKey(k => k + 1);
    };

    // Tweaks protocol
    React.useEffect(() => {
      const handler = (e) => {
        if (e.data?.type === '__activate_edit_mode') setTweaksOpen(true);
        if (e.data?.type === '__deactivate_edit_mode') setTweaksOpen(false);
      };
      window.addEventListener('message', handler);
      window.parent.postMessage({ type: '__edit_mode_available' }, '*');
      return () => window.removeEventListener('message', handler);
    }, []);

    const updateTweak = (key, val) => {
      const next = { ...tweaks, [key]: val };
      setTweaks(next);
      window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [key]: val } }, '*');
    };

    const pageMap = { home: HomePage, productos: ProductosPage, nosotros: NosotrosPage, contacto: ContactoPage };
    const PageComp = pageMap[page] || HomePage;

    return (
      <>
        {/* Inject CSS variables from tweaks */}
        <style>{`
          :root {
            --sage: ${tweaks.accentColor};
            --dark: ${tweaks.darkColor};
            --bg: ${tweaks.bgColor};
          }
          body { background-color: ${tweaks.bgColor}; }
        `}</style>

        <Header page={page} setPage={setPage} />

        <main key={animKey} className="page-enter">
          <PageComp setPage={setPage} tweaks={tweaks} />
        </main>

        <Footer setPage={setPage} />

        {/* WhatsApp FAB */}
        <a href="https://wa.me/5215518026391" target="_blank" rel="noopener noreferrer" className="wa-fab" aria-label="WhatsApp">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
          </svg>
        </a>

        {/* Tweaks Panel */}
        {tweaksOpen && (
          <div style={{
            position: 'fixed', bottom: 24, left: 24, zIndex: 200,
            backgroundColor: '#fff', borderRadius: 20, padding: 24,
            boxShadow: '0 24px 80px rgba(0,0,0,0.18)', width: 280,
            border: '1px solid rgba(0,0,0,0.08)',
          }}>
            <p style={{ fontSize: 12, fontWeight: 700, textTransform: 'uppercase', letterSpacing: '0.2em', color: '#999', marginBottom: 20, fontFamily: "'DM Sans', sans-serif" }}>Tweaks</p>

            <div style={{ display: 'flex', flexDirection: 'column', gap: 18 }}>
              <div>
                <label style={{ fontSize: 11, fontWeight: 600, color: '#555', display: 'block', marginBottom: 8, fontFamily: "'DM Sans', sans-serif" }}>Color acento (sage)</label>
                <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
                  {['#aad585','#85c1e9','#f2bae0','#f9c74f','#e8a598'].map(c => (
                    <button key={c} onClick={() => updateTweak('accentColor', c)} style={{
                      width: 30, height: 30, borderRadius: '50%', background: c, border: tweaks.accentColor === c ? '3px solid #333' : '2px solid transparent',
                      cursor: 'pointer', transition: 'transform 0.2s',
                    }}
                    onMouseEnter={e => e.target.style.transform = 'scale(1.15)'}
                    onMouseLeave={e => e.target.style.transform = 'none'} />
                  ))}
                </div>
              </div>

              <div>
                <label style={{ fontSize: 11, fontWeight: 600, color: '#555', display: 'block', marginBottom: 8, fontFamily: "'DM Sans', sans-serif" }}>Color oscuro</label>
                <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
                  {['#1C2B12','#1a1a2e','#2d1515','#1a2535','#2d2416'].map(c => (
                    <button key={c} onClick={() => updateTweak('darkColor', c)} style={{
                      width: 30, height: 30, borderRadius: '50%', background: c, border: tweaks.darkColor === c ? '3px solid #aad585' : '2px solid transparent',
                      cursor: 'pointer', transition: 'transform 0.2s',
                    }}
                    onMouseEnter={e => e.target.style.transform = 'scale(1.15)'}
                    onMouseLeave={e => e.target.style.transform = 'none'} />
                  ))}
                </div>
              </div>

              <div>
                <label style={{ fontSize: 11, fontWeight: 600, color: '#555', display: 'block', marginBottom: 8, fontFamily: "'DM Sans', sans-serif" }}>Fondo</label>
                <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
                  {['#F7F4EF','#FAF9F7','#F0EDE6','#FFFEF9','#F5F2FF'].map(c => (
                    <button key={c} onClick={() => updateTweak('bgColor', c)} style={{
                      width: 30, height: 30, borderRadius: '50%', background: c, border: tweaks.bgColor === c ? '3px solid #333' : '2px solid #ddd',
                      cursor: 'pointer', transition: 'transform 0.2s',
                    }}
                    onMouseEnter={e => e.target.style.transform = 'scale(1.15)'}
                    onMouseLeave={e => e.target.style.transform = 'none'} />
                  ))}
                </div>
              </div>

              <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
                <span style={{ fontSize: 12, fontWeight: 600, color: '#555', fontFamily: "'DM Sans', sans-serif" }}>Cards redondeadas</span>
                <button onClick={() => updateTweak('roundedCards', !tweaks.roundedCards)} style={{
                  width: 44, height: 24, borderRadius: 100, border: 'none', cursor: 'pointer',
                  background: tweaks.roundedCards ? '#1C2B12' : '#ddd',
                  position: 'relative', transition: 'background 0.25s',
                }}>
                  <span style={{ position: 'absolute', top: 3, left: tweaks.roundedCards ? 23 : 3, width: 18, height: 18, borderRadius: '50%', background: '#fff', transition: 'left 0.25s', boxShadow: '0 1px 4px rgba(0,0,0,0.2)' }} />
                </button>
              </div>

              <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
                <span style={{ fontSize: 12, fontWeight: 600, color: '#555', fontFamily: "'DM Sans', sans-serif" }}>Mostrar precios</span>
                <button onClick={() => updateTweak('showPrices', !tweaks.showPrices)} style={{
                  width: 44, height: 24, borderRadius: 100, border: 'none', cursor: 'pointer',
                  background: tweaks.showPrices ? '#1C2B12' : '#ddd',
                  position: 'relative', transition: 'background 0.25s',
                }}>
                  <span style={{ position: 'absolute', top: 3, left: tweaks.showPrices ? 23 : 3, width: 18, height: 18, borderRadius: '50%', background: '#fff', transition: 'left 0.25s', boxShadow: '0 1px 4px rgba(0,0,0,0.2)' }} />
                </button>
              </div>
            </div>
          </div>
        )}
      </>
    );
  }

  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(<App />);
</script>

</body>
</html>
